name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
    paths:
      - "src/main.rs"
      - "**/*.locres"
  workflow_dispatch: {}

jobs:
  build:
    name: CI (${{ matrix.target_name }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: windows-latest
            target_name: windows
            exe_name: WOS_JapaneseMOD.exe
          - runs_on: macos-latest
            target_name: macos
            exe_name: WOS_JapaneseMOD

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        run: cargo build --release

      - name: Prepare staging directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p "dist/${{ matrix.target_name }}"
          # executable
          cp -f "target/release/${{ matrix.exe_name }}" "dist/${{ matrix.target_name }}/${{ matrix.exe_name }}"
          # MOD data
          cp -R "WOS_JapaneseMOD_Knapford" "dist/${{ matrix.target_name }}/"
          cp -R "WOS_JapaneseMOD_SODOR" "dist/${{ matrix.target_name }}/"
          # docs/licenses (keep lightweight but useful)
          cp -f "README.md" "dist/${{ matrix.target_name }}/README.md"
          if [ -f "LICENSE" ]; then cp -f "LICENSE" "dist/${{ matrix.target_name }}/LICENSE"; fi
          if [ -d "font_licenses" ]; then cp -R "font_licenses" "dist/${{ matrix.target_name }}/"; fi
          if [ -d "screenshots" ]; then cp -R "screenshots" "dist/${{ matrix.target_name }}/"; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WOS_JapaneseMOD-${{ matrix.target_name }}
          path: dist/${{ matrix.target_name }}/

