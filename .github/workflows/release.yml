name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build/upload (e.g. v0.2.0). Leave empty to use the current ref."
        required: false
        type: string
      dry_run:
        description: "If true, build artifacts only (do not upload to GitHub Release)."
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build (${{ matrix.target_name }})
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: windows-latest
            target_name: windows
            exe_name: WOS_JapaneseMOD.exe
          - runs_on: macos-latest
            target_name: macos
            exe_name: WOS_JapaneseMOD

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        run: cargo build --release

      - name: Prepare staging directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p "dist/${{ matrix.target_name }}"
          # executable
          cp -f "target/release/${{ matrix.exe_name }}" "dist/${{ matrix.target_name }}/${{ matrix.exe_name }}"
          # MOD data
          cp -R "WOS_JapaneseMOD_Knapford" "dist/${{ matrix.target_name }}/"
          cp -R "WOS_JapaneseMOD_SODOR" "dist/${{ matrix.target_name }}/"
          # docs/licenses
          cp -f "README.md" "dist/${{ matrix.target_name }}/README.md"
          if [ -f "LICENSE" ]; then cp -f "LICENSE" "dist/${{ matrix.target_name }}/LICENSE"; fi
          if [ -d "font_licenses" ]; then cp -R "font_licenses" "dist/${{ matrix.target_name }}/"; fi
          if [ -d "screenshots" ]; then cp -R "screenshots" "dist/${{ matrix.target_name }}/"; fi

      - name: Create zip
        id: zip
        shell: bash
        run: |
          release_tag="${{ inputs.release_tag || github.ref_name }}"
          echo "zip_name=WOS_JapaneseMOD-${{ matrix.target_name }}-${release_tag}.zip" >> "$GITHUB_OUTPUT"

      - name: Create zip (macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd "dist/${{ matrix.target_name }}"
          zip -r "../${{ steps.zip.outputs.zip_name }}" .

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $target = "dist/${{ matrix.target_name }}"
          $zip = "dist/${{ steps.zip.outputs.zip_name }}"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$target/*" -DestinationPath $zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WOS_JapaneseMOD-${{ matrix.target_name }}
          path: dist/${{ steps.zip.outputs.zip_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && !inputs.dry_run) }}
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: WOS_JapaneseMOD-*
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: dist/*.zip
          overwrite_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
